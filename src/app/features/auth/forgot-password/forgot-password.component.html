@if (!sent()) {
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-icon">🔑</span>
      <h1 class="auth-title">Recuperar contraseña</h1>
      <p class="auth-sub">Te enviaremos un enlace por correo</p>
    </div>

    <form class="auth-form" (submit)="$event.preventDefault(); submit()">
      <div class="field-group">
        <label class="field-label">Correo electrónico</label>
        <input
          class="field"
          type="email"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          placeholder="tu@correo.com"
          autocomplete="email"
        />
      </div>
      <button class="btn-auth" type="submit" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Enviando…
        } @else {
          Enviar enlace
        }
      </button>
    </form>

    <p class="auth-footer">
      <a routerLink="/login">← Volver al inicio</a>
    </p>
  </div>
} @else {
  <div class="auth-card success-card">
    <div class="success-icon">📧</div>
    <h2 class="success-title">Revisa tu correo</h2>
    <p class="success-msg">
      Enviamos un enlace de recuperación a <strong>{{ email() }}</strong>.
      Abre el correo y haz clic en el enlace para cambiar tu contraseña.
    </p>
    <a class="btn-back" routerLink="/login">Volver al inicio</a>
  </div>
}
