<div class="auth-layout">
  <div class="auth-panel-left">
    <span class="auth-brand-mark">✈</span>
    <div class="auth-brand-name">Venezuela González</div>
    <div class="auth-brand-tagline">Planificador de viaje · 2026</div>
  </div>

  <div class="auth-panel-right">
    <div class="auth-form-wrap">
      <div class="auth-heading">Bienvenido</div>
      <div class="auth-subheading">Inicia sesión para acceder al planificador</div>

      <form class="auth-form" (submit)="$event.preventDefault(); submit()">
        <div class="auth-field-group">
          <label class="auth-field-label">Correo electrónico</label>
          <input
            class="auth-field"
            type="email"
            [value]="email()"
            (input)="set('email', $any($event.target).value)"
            placeholder="tu@correo.com"
            autocomplete="email"
          />
        </div>
        <div class="auth-field-group">
          <label class="auth-field-label">Contraseña</label>
          <input
            class="auth-field"
            type="password"
            [value]="password()"
            (input)="set('password', $any($event.target).value)"
            placeholder="••••••••"
            autocomplete="current-password"
            (keydown.enter)="submit()"
          />
        </div>
        <button class="auth-submit" type="submit" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner"></span> Entrando…
          } @else {
            Entrar
          }
        </button>
      </form>

      <div class="auth-divider">
        <span>o</span>
      </div>

      <button class="auth-google" type="button" [disabled]="googleLoading() || loading()" (click)="signInWithGoogle()">
        @if (googleLoading()) {
          <span class="spinner spinner--dark"></span> Redirigiendo…
        } @else {
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continuar con Google
        }
      </button>

      <div class="auth-links">
        <span>¿Quieres unirte?</span>
        <a routerLink="/register">Solicitar acceso</a>
        <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
  </div>
</div>
